name: Build and Push Docker Image
on:
  push:
    tags:
     - '*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'The version tag to build (e.g., 1.2.3)'
        required: true

jobs:
  build-and-push:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    name: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # On workflow_dispatch, checkout the tag passed in. On a tag push, checkout the tag from the event.
          ref: ${{ github.event.inputs.version || github.ref }}
          fetch-depth: 0

      - name: Setup Docker Builder
        uses: useblacksmith/setup-docker-builder@33803e640bd9d674f2843a8c323aa2a7da478d23 # v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version
        id: version
        run: echo "VERSION=${{ github.event.inputs.version || github.ref_name }}" >> $GITHUB_ENV

      - name: Convert repository name to lowercase
        id: repo
        run: echo "REPO_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: useblacksmith/build-push-action@fb9e3e6a9299c78462bfadd0d93352c316adc9b8 # v2.2.0
        with:
          push: true
          tags: ghcr.io/${{ env.REPO_NAME }}:${{ env.VERSION }},ghcr.io/${{ env.REPO_NAME }}:latest
